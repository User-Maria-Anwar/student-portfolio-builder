<!DOCTYPE html>
<html>
<head>

    <title>Portfolio Templates</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
            min-height:100vh;
            font-family:Arial,sans-serif;
            padding-bottom:50px;
        }

        .page-title{
            text-align:center;
            color:white;
            padding:60px 20px 30px;
        }

        .page-title h1{
            font-size:50px;
            font-weight:800;
            margin-bottom:15px;
        }

        .page-title p{
            color:#cbd5e1;
            font-size:18px;
        }

        .category-title{
            color:white;
            margin-bottom:25px;
            font-size:32px;
            font-weight:700;
        }

        .template-card{
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(12px);
            border-radius:20px;
            overflow:hidden;
            transition:0.4s;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            border:1px solid rgba(255,255,255,0.15);
            height:100%;
        }

        .template-card:hover{
            transform:translateY(-10px) scale(1.02);
            box-shadow:0 20px 45px rgba(0,0,0,0.45);
        }

        .template-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .template-content{
            padding:20px;
            text-align:center;
            color:white;
        }

        .template-content h4{
            font-weight:700;
            margin-bottom:12px;
        }

        .template-content p{
            color:#cbd5e1;
            font-size:14px;
            margin-bottom:20px;
        }

        .btn-select{
             background:#2563eb;
            border:none;
            color:white;
            padding:12px 22px;
            border-radius:12px;
            font-weight:600;
            transition:0.3s;
            width:100%;
        }

        .btn-select:hover{
            background:#1d4ed8;
        }

        .template-section{
            margin-top:50px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="page-title">

        <h1>Choose Your Portfolio Template</h1>

        <p>
            Select a beautiful portfolio design and start building your professional portfolio.
        </p>

    </div>

    <div id="templateList"></div>

</div>

<script src="js/templates.js"></script>

</body>
</html>
